<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Easy Chrome</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="../css/popup.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <div class="d-flex gap-2" id="buttonContainer">
        <button class="action-btn" id="refreshBtn" title="Refresh" draggable="true" data-position="0">
          <div class="btn-content">
            <span class="btn-icon">↺</span>
          </div>
        </button>
        <button class="action-btn" id="hardRefreshBtn" title="Hard Refresh (Clear Cache)" draggable="true" data-position="1">
          <div class="btn-content">
            <span class="btn-icon">⚙️</span>
          </div>
        </button>
        <button class="action-btn" id="clearCacheBtn" title="Clear Browser Cache" draggable="true" data-position="2">
          <div class="btn-content">
            <span class="btn-icon">🗑️</span>
          </div>
        </button>
        <button class="action-btn" id="duplicateTabBtn" title="Duplicate Tab" draggable="true" data-position="3">
          <div class="btn-content">
            <span class="btn-icon">⧉</span>
          </div>
        </button>
        <button class="action-btn" id="muteBtn" title="Toggle Mute" draggable="true" data-position="4">
          <div class="btn-content">
            <span class="btn-icon">🔊</span>
          </div>
        </button>
        <button class="action-btn" id="screenshotBtn" title="Take Screenshot" draggable="true" data-position="5">
          <div class="btn-content">
            <span class="btn-icon">📸</span>
          </div>
        </button>
        <button class="action-btn" id="groupTabsBtn" title="Group All Tabs" draggable="true" data-position="6">
          <div class="btn-content">
            <span class="btn-icon">🗂️</span>
          </div>
        </button>
        <button class="action-btn" id="lockTabBtn" title="Lock Tab" draggable="true" data-position="7">
          <div class="btn-content">
            <span class="btn-icon">🔒</span>
          </div>
        </button>
        <button class="action-btn" id="pipBtn" title="Picture in Picture" draggable="true" data-position="8">
          <div class="btn-content">
            <span class="btn-icon">🎬</span>
          </div>
        </button>
      </div>
    </div>
  </nav>

  <!-- Custom JS -->
  <script type="module" src="../js/popup/popup.js"></script>
  <script type="module" src="../js/popup/screenshot.js"></script>
  <script type="module" src="../js/popup/lockTab.js"></script>
  <script type="module" src="../js/popup/pip.js"></script>
</body>
</html>
